<!-- Mobile backdrop -->
<div *ngIf="isMobileMenuOpen" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-40 lg:hidden transition-opacity"
    (click)="closeMenu.emit()">
</div>

<!-- Sidebar -->
<aside [class.translate-x-0]="isMobileMenuOpen" [class.-translate-x-full]="!isMobileMenuOpen"
    class="fixed inset-y-0 left-0 z-50 w-64 bg-surface dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transition-all duration-300 ease-in-out lg:translate-x-0 lg:static lg:block shadow-xl lg:shadow-none">
    <div class="h-full flex flex-col pt-5 pb-4 overflow-y-auto">

        <!-- Logo -->
        <div class="flex items-center px-6 mb-8 mt-2">
            <div
                class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-500 to-secondary-500 flex items-center justify-center mr-3 shadow-md shadow-primary-500/20">
                <i-lucide name="activity" class="text-white w-5 h-5"></i-lucide>
            </div>
            <span
                class="text-xl font-bold text-slate-800 dark:text-white tracking-tight transition-colors">PhysioPro</span>

            <!-- Close button on mobile -->
            <button (click)="closeMenu.emit()"
                class="ml-auto lg:hidden text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 focus:outline-none">
                <i-lucide name="x" class="w-6 h-6"></i-lucide>
            </button>
        </div>

        <!-- Navigation -->
        <nav class="mt-2 px-3 space-y-1 flex-1">
            <!-- Section title -->
            <div
                class="px-3 text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2 mt-4">
                Main Menu
            </div>

            <!-- Links -->
            @for (item of menuItems; track item.path) {
            <a [routerLink]="item.path"
                routerLinkActive="bg-primary-50 dark:bg-primary-500/10 text-primary-600 dark:text-primary-400 font-medium before:block before:absolute before:inset-y-0 before:-left-3 before:w-1 before:bg-primary-500 before:rounded-r-md"
                [routerLinkActiveOptions]="{exact: false}"
                class="relative group flex items-center px-3 py-2.5 text-sm font-medium rounded-xl text-slate-600 dark:text-slate-400 hover:text-primary-600 dark:hover:text-primary-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all mb-1"
                (click)="isMobileMenuOpen = false; closeMenu.emit()">
                <i-lucide [name]="item.icon"
                    class="flex-shrink-0 w-5 h-5 mr-3 transition-colors duration-200 group-hover:text-primary-500 dark:group-hover:text-primary-400"
                    [class.text-primary-500]="false" [class.dark:text-primary-400]="false"></i-lucide>
                {{ item.label }}
            </a>
            }
        </nav>

        <!-- Bottom Actions -->
        <div class="flex-shrink-0 flex border-t border-slate-200 dark:border-slate-800 p-4 transition-colors">
            <a routerLink="/login"
                class="flex-shrink-0 w-full group block bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-3 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                <div class="flex items-center">
                    <div>
                        <img class="inline-block h-9 w-9 rounded-full ring-2 ring-transparent dark:ring-slate-700 group-hover:ring-slate-300 dark:group-hover:ring-slate-600 transition-all"
                            src="assets/doctors/mark.png"
                            onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff'"
                            alt="Avatar">
                    </div>
                    <div class="ml-3">
                        <p
                            class="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-slate-900 dark:group-hover:text-white transition-colors">
                            Demo User
                        </p>
                        <p
                            class="text-xs font-medium text-slate-500 dark:text-slate-500 group-hover:text-slate-700 dark:group-hover:text-slate-400 transition-colors">
                            Logout
                        </p>
                    </div>
                </div>
            </a>
        </div>
    </div>
</aside>
