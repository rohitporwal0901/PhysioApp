<!-- Mobile backdrop -->
<div *ngIf="isMobileMenuOpen" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-40 lg:hidden"
    (click)="closeMenu.emit()">
</div>

<!-- Sidebar -->
<aside [class.translate-x-0]="isMobileMenuOpen" [class.-translate-x-full]="!isMobileMenuOpen"
    class="fixed inset-y-0 left-0 z-[60] w-64 bg-white dark:bg-slate-900 border-r border-slate-100 dark:border-slate-800 transition-all duration-300 ease-in-out lg:translate-x-0 lg:static lg:block shadow-2xl lg:shadow-none flex flex-col mobile-sidebar">

    <!-- Logo + Close -->
    <div class="flex items-center px-5 h-16 border-b border-slate-100 dark:border-slate-800 flex-shrink-0 logo-container">
        <div
            class="w-9 h-9 rounded-xl bg-gradient-to-br from-primary-500 to-secondary-500 flex items-center justify-center mr-3 shadow-md shadow-primary-500/20 flex-shrink-0">
            <i-lucide name="activity" class="text-white w-5 h-5"></i-lucide>
        </div>
        <span class="text-lg font-black text-slate-800 dark:text-white tracking-tight font-heading">
            Physio<span class="text-primary-500">Pro</span>
        </span>
        <button (click)="closeMenu.emit()"
            class="ml-auto lg:hidden text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
            <i-lucide name="x" class="w-5 h-5"></i-lucide>
        </button>
    </div>

    <!-- Role indicator pill -->
    <div class="px-4 pt-5 pb-3">
        <div class="flex items-center gap-2.5 px-3 py-2.5 rounded-2xl bg-gradient-to-r"
            [ngClass]="roleColorClasses + ' bg-opacity-10'">
            <div class="w-8 h-8 rounded-xl bg-white/30 backdrop-blur-sm flex items-center justify-center flex-shrink-0">
                <i-lucide [name]="roleIcon" class="w-4 h-4 text-white"></i-lucide>
            </div>
            <div>
                <p class="text-xs font-bold text-white/70 uppercase tracking-wider">Logged in as</p>
                <p class="text-sm font-black text-white leading-tight">{{ roleLabel }}</p>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-2 overflow-y-auto">
        <p class="px-3 text-[10px] font-bold text-slate-400 dark:text-slate-600 uppercase tracking-widest mb-3">
            Main Menu
        </p>

        @for (item of menuItems; track item.path) {
        <a [routerLink]="item.path"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{exact: false}"
            class="relative group flex items-center justify-between px-4 py-3 text-sm font-medium rounded-xl text-slate-500 dark:text-slate-400 hover:text-primary-600 dark:hover:text-primary-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all mb-1"
            (click)="closeMenu.emit()">

            <div class="flex items-center gap-3">
                <i-lucide [name]="item.icon" class="flex-shrink-0 w-5 h-5 transition-colors duration-200"></i-lucide>
                <span>{{ item.label }}</span>
            </div>

            <!-- Badge -->
            <span *ngIf="item.badge" class="text-[10px] font-bold px-2 py-0.5 rounded-full" [ngClass]="item.badgeColor">
                {{ item.badge }}
            </span>
        </a>
        }
    </nav>

    <!-- Bottom: User card -->
    <div class="border-t border-slate-100 dark:border-slate-800 p-4 flex-shrink-0">
        <div
            class="flex items-center gap-3 p-3 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors cursor-pointer group">
            <div class="relative flex-shrink-0">
                <img class="h-9 w-9 rounded-xl object-cover ring-2 ring-transparent group-hover:ring-primary-100 dark:group-hover:ring-slate-700 transition-all"
                    src="https://ui-avatars.com/api/?name={{ userName }}&background=0F9B8E&color=fff&size=36"
                    onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff'"
                    alt="Avatar">
                <span
                    class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-status-success border-2 border-white dark:border-slate-900 rounded-full"></span>
            </div>
            <div class="flex-1 overflow-hidden">
                <p class="text-sm font-bold text-slate-700 dark:text-slate-200 truncate">{{ userName }}</p>
                <p class="text-xs text-slate-400 dark:text-slate-500">{{ roleLabel }} Account</p>
            </div>
            <button (click)="onLogout()"
                class="text-slate-300 dark:text-slate-600 hover:text-red-400 dark:hover:text-red-400 transition-colors p-1.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20"
                title="Logout">
                <i-lucide name="log-out" class="w-4 h-4"></i-lucide>
            </button>
        </div>
    </div>
</aside>
