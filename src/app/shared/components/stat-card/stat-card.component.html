<div
    class="bg-surface rounded-2xl p-6 shadow-glass border border-slate-100 hover:-translate-y-1 hover:shadow-xl hover:shadow-primary-500/5 transition-all duration-300 group">
    <div class="flex items-center">

        <!-- Icon Container -->
        <div
            class="p-3 rounded-xl bg-primary-50 text-primary-500 group-hover:bg-primary-500 group-hover:text-white transition-colors duration-300">
            <i-lucide [name]="icon" class="w-6 h-6"></i-lucide>
        </div>

        <!-- Details -->
        <div class="ml-5 w-0 flex-1">
            <dl>
                <dt class="text-sm font-medium text-slate-500 truncate group-hover:text-slate-700 transition-colors">
                    {{ title }}
                </dt>
                <dd>
                    <div class="text-2xl font-bold text-slate-900 group-hover:text-primary-900 transition-colors">
                        {{ value }}
                    </div>
                </dd>
            </dl>
        </div>
    </div>

    <!-- Optional Trend Indicator -->
    <div *ngIf="trend" class="mt-4 flex items-center text-sm" [ngClass]="{
         'text-status-success': trendDirection === 'up',
         'text-status-danger': trendDirection === 'down',
         'text-slate-500': trendDirection === 'neutral'
       }">
        <span class="font-medium mr-2">{{ trend }}</span>
        <span class="text-slate-400">from last month</span>
    </div>
</div>
