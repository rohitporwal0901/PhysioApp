<div [ngClass]="bgClass"
    class="rounded-[1.5rem] p-6 shadow-glass hover:-translate-y-1 hover:shadow-xl transition-all duration-300 flex flex-col justify-between min-h-[140px] relative overflow-hidden group">

    <!-- Decorative element -->
    <div
        class="absolute -right-4 -bottom-4 w-24 h-24 bg-white/10 rounded-full blur-xl group-hover:scale-110 transition-transform duration-500">
    </div>

    <div class="flex justify-between items-start z-10">
        <!-- Details -->
        <div class="flex flex-col flex-1">
            <span class="text-base font-semibold" [ngClass]="textClass">{{ title }}</span>
            <div class="text-4xl font-bold mt-2 tracking-tight" [ngClass]="textClass">
                {{ value }}
            </div>
        </div>

        <!-- Optional Trend Indicator next to Title -->
        <div *ngIf="trend" class="flex items-center text-sm px-2 py-1 rounded-full bg-white/20 backdrop-blur-sm"
            [ngClass]="textClass">
            <span class="font-medium font-heading">{{ trend }}</span>
        </div>
    </div>

    <!-- Bottom right aligned Icon -->
    <div class="absolute bottom-6 right-6 z-10">
        <div [ngClass]="iconClass"
            class="p-3 rounded-2xl flex items-center justify-center transition-all duration-300 backdrop-blur-sm shadow-sm">
            <i-lucide [name]="icon" class="w-6 h-6"></i-lucide>
        </div>
    </div>
</div>
