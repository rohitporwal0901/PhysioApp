<div class="h-full flex flex-col gap-6 max-w-7xl mx-auto">
    <!-- Header Controls -->
    <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center p-6 bg-surface dark:bg-slate-800 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-glass transition-colors">
        <div>
            <h2 class="text-2xl font-bold text-slate-800 dark:text-white tracking-tight mb-2">My Patients</h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm">View your active and discharged patient records.</p>
        </div>
        <div class="flex items-center space-x-3 mt-4 md:mt-0">
            <div class="relative w-full md:w-64">
                <i-lucide name="search"
                    class="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i-lucide>
                <input type="text" placeholder="Search patients..."
                    class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none dark:text-white transition-colors">
            </div>
            <!-- Doctor usually doesn't add patient directly, but let's keep a button for e.g. Add Notes -->
            <button
                class="flex items-center justify-center bg-primary-500 hover:bg-primary-600 text-white font-bold py-2.5 px-6 rounded-xl transition-colors shadow-md shadow-primary-500/20 whitespace-nowrap">
                <i-lucide name="plus" class="w-4 h-4 mr-2"></i-lucide> Action
            </button>
        </div>
    </div>

    <!-- Patients Grid -->
    <div class="flex-1">
        <ng-container *ngIf="patients$ | async as patients; else loadingPatients">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Mini Card -->
                <div *ngFor="let p of patients"
                    class="bg-surface dark:bg-slate-800 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm hover:shadow-md transition-all duration-300 p-6 flex flex-col group relative overflow-hidden cursor-pointer">

                    <!-- Status Badge -->
                    <div class="absolute top-4 right-4">
                        <span
                            class="px-2.5 py-1 inline-flex text-xs leading-5 font-semibold rounded-full transition-colors"
                            [ngClass]="{
                                  'bg-status-success/10 text-status-success dark:bg-status-success/20 dark:text-emerald-400': p.status === 'active',
                                  'bg-slate-100 text-slate-500 dark:bg-slate-700 dark:text-slate-400': p.status === 'discharged'
                              }">
                            {{ p.status | titlecase }}
                        </span>
                    </div>

                    <div class="flex items-center space-x-4 mb-4">
                        <!-- Patient Photo -->
                        <div class="relative">
                            <img [src]="'https://ui-avatars.com/api/?name=' + (p.name || 'Patient') + '&background=random&color=fff&size=128'" 
                                 alt="Patient Avatar"
                                 class="w-16 h-16 rounded-2xl object-cover ring-2 ring-slate-50 dark:ring-slate-700/50 shadow-sm group-hover:scale-105 transition-transform duration-300">
                        </div>
                        <div>
                            <h3
                                class="text-lg font-bold text-slate-900 dark:text-white group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors">
                                {{ p.name }}</h3>
                            <p class="text-xs text-slate-500 dark:text-slate-400">ID: PAT-{{ p.id }}</p>
                        </div>
                    </div>

                    <div class="space-y-3 mb-6">
                        <div class="flex flex-col">
                            <span
                                class="text-xs text-slate-400 dark:text-slate-500 uppercase tracking-wider font-semibold">Condition</span>
                            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">{{ p.condition
                                }}</span>
                        </div>
                        <div class="flex flex-col">
                            <span
                                class="text-xs text-slate-400 dark:text-slate-500 uppercase tracking-wider font-semibold">Last
                                Visit</span>
                            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">{{ p.lastVisit
                                }}</span>
                        </div>
                    </div>

                    <div class="w-full flex space-x-3 mt-auto border-t border-slate-100 dark:border-slate-700 pt-5">
                        <button
                            class="flex-1 py-2 text-sm font-semibold rounded-xl text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-700/50 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                            View Notes
                        </button>
                        <button
                            class="w-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-primary-600 dark:hover:text-primary-400 hover:bg-primary-50 dark:hover:bg-slate-700 pt-0.5 transition-colors">
                            <i-lucide name="more-horizontal" class="w-5 h-5"></i-lucide>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Pagination (Mock) -->
            <div
                class="px-6 py-4 bg-transparent mt-4 flex items-center justify-between text-sm text-slate-500 dark:text-slate-400 transition-colors">
                <span>Showing results 1-8 of 24</span>
                <div class="flex space-x-2">
                    <button
                        class="p-2 rounded-lg bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                        <i-lucide name="chevron-right" class="w-4 h-4 rotate-180"></i-lucide>
                    </button>
                    <button
                        class="p-2 rounded-lg bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                        <i-lucide name="chevron-right" class="w-4 h-4"></i-lucide>
                    </button>
                </div>
            </div>
        </ng-container>

        <!-- Loading State -->
        <ng-template #loadingPatients>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <div *ngFor="let i of [1,2,3,4,5,6,7,8]"
                    class="bg-surface dark:bg-slate-800 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm p-6 flex flex-col animate-pulse">
                    <div class="flex items-center space-x-4 mb-4">
                        <div class="w-16 h-16 bg-slate-200 dark:bg-slate-700 rounded-2xl"></div>
                        <div class="flex-1 space-y-2">
                            <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-3/4"></div>
                            <div class="h-3 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div>
                        </div>
                    </div>
                    <div class="space-y-4 mb-6">
                        <div class="h-8 bg-slate-200 dark:bg-slate-700 rounded w-full"></div>
                        <div class="h-8 bg-slate-200 dark:bg-slate-700 rounded w-full"></div>
                    </div>
                    <div class="h-10 bg-slate-200 dark:bg-slate-700 rounded w-full mt-auto"></div>
                </div>
            </div>
        </ng-template>
    </div>
</div>
