<div class="h-full flex flex-col gap-3 sm:gap-6 max-w-7xl mx-auto px-1.5 sm:px-0">
    <!-- Header Controls -->
    <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center p-4 sm:p-6 bg-surface dark:bg-slate-800 rounded-2xl sm:rounded-3xl border border-slate-100 dark:border-slate-700 shadow-glass transition-colors">
        <div>
            <h2 class="text-xl sm:text-2xl font-black text-slate-800 dark:text-white tracking-tight leading-none mb-1 sm:mb-2">My Patients</h2>
            <p class="text-slate-500 dark:text-slate-400 text-[10px] sm:text-sm font-medium">View your active patient records.</p>
        </div>
    </div>

    <!-- Patients Grid -->
    <div class="flex-1">
        <ng-container *ngIf="patients$ | async as patients; else loadingPatients">
            <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-2.5 sm:gap-6">
                <!-- Patient Card -->
                <div *ngFor="let p of patients; let i = index"
                    class="bg-surface dark:bg-slate-800 rounded-2xl sm:rounded-[2rem] border border-slate-100 dark:border-slate-700 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col group overflow-hidden">

                    <!-- Card Header / Avatar -->
                    <div class="p-3 sm:p-6 pb-2 sm:pb-4">
                        <div class="flex items-start justify-between mb-3 sm:mb-4">
                            <div class="relative">
                                <div
                                    class="w-12 h-12 sm:w-16 sm:h-16 rounded-xl sm:rounded-2xl overflow-hidden ring-4 ring-white dark:ring-slate-700 shadow-md">
                                    <img [src]="getPatientImage(p, i)" alt="Patient"
                                        class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                                </div>
                                <div
                                    class="absolute -bottom-0.5 -right-0.5 w-4 h-4 sm:w-5 sm:h-5 bg-status-success rounded-full border-2 border-white dark:border-slate-800 shadow-sm">
                                </div>
                            </div>
                            <span
                                class="px-2 py-0.5 sm:px-3 sm:py-1 bg-primary-50 dark:bg-primary-900/30 text-primary-600 dark:text-primary-400 text-[8px] sm:text-[10px] font-black uppercase tracking-widest rounded-full">
                                #{{ p.uid?.slice(-4) || 'XXXX' }}
                            </span>
                        </div>

                        <h3
                            class="text-sm sm:text-lg font-black text-slate-800 dark:text-white leading-tight mb-0.5 sm:mb-1 group-hover:text-primary-500 transition-colors truncate">
                            {{ p.name }}
                        </h3>
                        <div class="flex items-center text-[10px] sm:text-xs text-slate-400 dark:text-slate-500 font-bold">
                            <i-lucide name="map-pin" class="w-3 h-3 mr-1 opacity-70"></i-lucide>
                            {{ p.city || 'N/A' }}
                        </div>
                    </div>

                    <!-- Details Section -->
                    <div class="px-3 sm:px-6 space-y-3 sm:space-y-4 flex-1">
                        <!-- Condition -->
                        <div
                            class="p-2 sm:p-3 bg-slate-50 dark:bg-slate-900/50 rounded-xl sm:rounded-2xl border border-slate-100 dark:border-slate-700/50">
                            <label
                                class="text-[8px] sm:text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest block mb-1">Chief
                                Complaint</label>
                            <p class="text-[10px] sm:text-sm font-black text-slate-700 dark:text-slate-300 line-clamp-1">{{ p.condition
                                || 'General Observation' }}</p>
                        </div>

                        <!-- Upcoming Session Card -->
                        <div class="p-2 sm:p-4 rounded-xl sm:rounded-2xl border-2 border-dashed transition-colors"
                            [ngClass]="p.nextSession ? 'bg-primary-50/50 dark:bg-primary-900/10 border-primary-100 dark:border-primary-800/30' : 'bg-slate-50/30 dark:bg-slate-900/20 border-slate-100 dark:border-slate-800'">
                            <label
                                class="text-[8px] sm:text-[9px] font-black text-primary-500 uppercase tracking-widest block mb-1">Session</label>

                            <div *ngIf="p.nextSession" class="flex items-center">
                                <div class="mr-2 sm:mr-3 bg-white dark:bg-slate-800 p-1.5 sm:p-2 rounded-lg sm:rounded-xl shadow-sm">
                                    <i-lucide name="calendar" class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-primary-500"></i-lucide>
                                </div>
                                <div>
                                    <p class="text-[10px] sm:text-xs font-black text-slate-800 dark:text-white">{{ p.nextSession.date |
                                        date:'MMM d' }}</p>
                                    <p class="text-[9px] sm:text-[10px] font-bold text-slate-400">{{ p.nextSession.time }}</p>
                                </div>
                            </div>

                            <div *ngIf="!p.nextSession" class="flex items-center text-slate-400 italic">
                                <i-lucide name="calendar-off" class="w-3.5 h-3.5 mr-2 opacity-50"></i-lucide>
                                <span class="text-[9px] sm:text-[10px] font-bold">No sessions</span>
                            </div>
                        </div>
                    </div>

                    <!-- Footer Actions -->
                    <div class="p-3 sm:p-6 pt-2 sm:pt-4 mt-auto border-t border-slate-100/50 flex space-x-2">
                        <button (click)="sendWhatsApp(p)"
                            class="flex-1 py-1.5 sm:py-3 bg-emerald-500 hover:bg-emerald-600 text-white text-[9px] sm:text-xs font-black rounded-lg sm:rounded-2xl transition-all shadow-lg shadow-emerald-500/20 flex items-center justify-center">
                            <i-lucide name="message-circle" class="w-3.5 h-3.5 sm:w-4 sm:h-4 mr-1.5 sm:mr-2"></i-lucide>
                            WhatsApp
                        </button>
                    </div>
                </div>
            </div>

            <!-- Pagination (Mock) -->
            <div
                class="px-6 py-4 bg-transparent mt-4 flex items-center justify-between text-[10px] sm:text-sm text-slate-500 dark:text-slate-400 transition-colors">
                <span>Showing 1-{{ patients.length }} results</span>
                <div class="flex space-x-2">
                    <button
                        class="p-1.5 sm:p-2 rounded-lg bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                        <i-lucide name="chevron-left" class="w-3.5 h-3.5"></i-lucide>
                    </button>
                    <button
                        class="p-1.5 sm:p-2 rounded-lg bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                        <i-lucide name="chevron-right" class="w-3.5 h-3.5"></i-lucide>
                    </button>
                </div>
            </div>
        </ng-container>

        <!-- Loading State -->
        <ng-template #loadingPatients>
            <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <div *ngFor="let i of [1,2,3,4]"
                    class="bg-surface dark:bg-slate-800 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm p-6 flex flex-col animate-pulse">
                    <div class="flex items-center space-x-4 mb-4">
                        <div class="w-12 h-12 bg-slate-200 dark:bg-slate-700 rounded-xl"></div>
                        <div class="flex-1 space-y-2">
                            <div class="h-3 bg-slate-200 dark:bg-slate-700 rounded w-3/4"></div>
                        </div>
                    </div>
                    <div class="h-10 bg-slate-200 dark:bg-slate-700 rounded w-full mt-auto"></div>
                </div>
            </div>
        </ng-template>
    </div>
</div>
