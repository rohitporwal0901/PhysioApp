<div
    class="min-h-screen relative flex items-center justify-center overflow-hidden selection:bg-primary-500 selection:text-white bg-slate-100 dark:bg-darkbg">

    <!-- Background Image with Blur -->
    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1582213782179-e0d53f98f2ca?q=80&w=2940&auto=format&fit=crop"
            alt="Clinic Background" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-white/40 dark:bg-slate-900/60 backdrop-blur-sm"></div>
    </div>

    <!-- Main Container -->
    <div
        class="relative z-10 w-full max-w-4xl max-h-[700px] h-[90vh] flex rounded-3xl shadow-2xl overflow-hidden animate-fade-in-up">



        <!-- Login Form Panel -->
        <div
            class="flex-1 right-panel p-8 md:p-12 flex flex-col justify-center items-center relative bg-white/70 dark:bg-slate-800/80 backdrop-blur-2xl">
            <!-- Decorative Elements inside Form Side -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary-500/20 rounded-full blur-2xl"></div>

            <div class="w-full max-w-sm relative z-10">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-slate-800 dark:text-white mb-2 font-heading">
                        <span class="text-primary-500">PhysioCare</span> Login
                    </h1>
                </div>

                <!-- Role Selection -->
                <div
                    class="flex justify-center space-x-2 p-1 bg-white/50 dark:bg-slate-900/50 rounded-xl mb-8 backdrop-blur-md shadow-sm border border-white/50 dark:border-slate-700/50">
                    @for (role of ['Admin', 'Doctor', 'Patient']; track role) {
                    <button type="button" (click)="selectRole(role)" [class.bg-primary-500]="selectedRole === role"
                        [class.text-white]="selectedRole === role" [class.shadow-md]="selectedRole === role"
                        [class.text-slate-600]="selectedRole !== role"
                        [class.dark:text-slate-400]="selectedRole !== role"
                        class="flex-1 py-2 px-3 text-sm font-medium rounded-lg transition-all duration-300 focus:outline-none">
                        {{ role }}
                    </button>
                    }
                </div>

                <form class="space-y-5">
                    <div>
                        <input id="email" type="email" required
                            class="block w-full px-4 py-3.5 border border-white/60 dark:border-slate-700/60 rounded-xl bg-white/60 dark:bg-slate-900/60 text-slate-800 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all shadow-sm backdrop-blur-sm"
                            placeholder="Email">
                    </div>

                    <div>
                        <input id="password" type="password" required
                            class="block w-full px-4 py-3.5 border border-white/60 dark:border-slate-700/60 rounded-xl bg-white/60 dark:bg-slate-900/60 text-slate-800 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all shadow-sm backdrop-blur-sm"
                            placeholder="Password">
                    </div>

                    <div class="flex items-center justify-between text-sm py-1">
                        <a href="#"
                            class="font-medium text-slate-500 dark:text-slate-400 hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
                            Forgot Password?
                        </a>
                    </div>

                    <button type="button" (click)="login()"
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-full shadow-lg shadow-primary-500/30 text-base font-semibold text-white bg-primary-500 hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 focus:ring-offset-white dark:focus:ring-offset-slate-900 transition-all active:scale-[0.98]">
                        LOGIN
                    </button>

                    <!-- Bottom Action Buttons -->
                    <div class="flex justify-center space-x-4 mt-8 pt-4">
                        <button
                            class="w-12 h-12 rounded-full border border-primary-500/20 bg-white/50 text-primary-500 hover:bg-primary-50 dark:bg-slate-800/50 dark:border-slate-700 dark:hover:bg-slate-700 flex items-center justify-center transition-colors shadow-sm">
                            <i-lucide name="camera" class="w-5 h-5"></i-lucide>
                        </button>
                        <button
                            class="w-12 h-12 rounded-full border border-secondary-500/20 bg-white/50 text-secondary-500 hover:bg-secondary-50 dark:bg-slate-800/50 dark:border-slate-700 dark:hover:bg-slate-700 flex items-center justify-center transition-colors shadow-sm">
                            <i-lucide name="refresh-cw" class="w-5 h-5"></i-lucide>
                        </button>
                        <button
                            class="w-12 h-12 rounded-full border border-primary-500/20 bg-white/50 text-primary-500 hover:bg-primary-50 dark:bg-slate-800/50 dark:border-slate-700 dark:hover:bg-slate-700 flex items-center justify-center transition-colors shadow-sm">
                            <i-lucide name="fingerprint" class="w-5 h-5"></i-lucide>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
