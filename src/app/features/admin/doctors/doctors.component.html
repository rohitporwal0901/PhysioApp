<div class="h-full flex flex-col gap-6 max-w-7xl mx-auto">

    <!-- Header Controls -->
    <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center p-6 bg-white dark:bg-slate-800 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-card transition-colors">
        <div>
            <h2 class="text-2xl font-bold text-slate-800 dark:text-white tracking-tight mb-1 font-heading">Doctors</h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm">Manage specialist doctors displayed on your public
                landing page.</p>
        </div>
        <div class="flex items-center space-x-3 mt-4 md:mt-0">
            <div class="relative w-full md:w-64">
                <i-lucide name="search"
                    class="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i-lucide>
                <input type="text" [(ngModel)]="searchQuery" placeholder="Search doctors..."
                    class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none dark:text-white transition-colors">
            </div>
            <button (click)="openAddModal()"
                class="flex items-center justify-center bg-primary-500 hover:bg-primary-600 text-white font-semibold py-2.5 px-5 rounded-xl transition-colors shadow-md shadow-primary-500/25 whitespace-nowrap gap-2 active:scale-95">
                <i-lucide name="plus" class="w-4 h-4"></i-lucide>
                Add Doctor
            </button>
        </div>
    </div>

    <!-- Doctors Grid -->
    <ng-container *ngIf="doctors$ | async as doctors">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div *ngFor="let doc of doctors | slice:0:100"
                class="bg-white dark:bg-slate-800 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm hover:shadow-card transition-all duration-300 overflow-hidden group">

                <!-- Card photo top -->
                <div class="relative h-44 bg-gradient-to-br from-primary-400 to-primary-600 overflow-hidden">
                    <img [src]="doc.image"
                        onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=Doctor&background=0F9B8E&color=fff&size=200'"
                        alt="Doctor Avatar"
                        class="w-full h-full object-cover object-top group-hover:scale-105 transition-transform duration-500">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent"></div>

                    <!-- Status badge -->
                    <div class="absolute top-3 left-3">
                        <span class="px-2.5 py-1 rounded-full text-xs font-bold"
                            [ngClass]="doc.available ? 'bg-status-success text-white' : 'bg-slate-200 text-slate-600'">
                            {{ doc.available ? '● Available' : '○ Booked' }}
                        </span>
                    </div>

                    <!-- Toggle availability -->
                    <button (click)="toggleAvailability(doc.id)"
                        class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 flex items-center justify-center hover:bg-white/40 transition-colors"
                        title="Toggle availability">
                        <i-lucide name="refresh-cw" class="w-3.5 h-3.5 text-white"></i-lucide>
                    </button>
                </div>

                <!-- Info -->
                <div class="p-5">
                    <h3
                        class="text-base font-bold text-slate-900 dark:text-white mb-0.5 group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors font-heading truncate">
                        {{ doc.name }}</h3>
                    <p class="text-sm font-semibold text-primary-600 dark:text-primary-400 mb-3 truncate">{{
                        doc.specialty }}</p>

                    <!-- Rating -->
                    <div class="flex items-center space-x-1 mb-4">
                        <i-lucide name="star" class="w-3.5 h-3.5 text-amber-400"
                            [ngStyle]="{'fill': 'currentColor'}"></i-lucide>
                        <span class="text-xs font-bold text-slate-700 dark:text-slate-200">{{ doc.rating }}</span>
                    </div>

                    <!-- Actions -->
                    <div class="flex gap-2">
                        <button
                            class="flex-1 py-2 text-sm font-semibold rounded-xl text-primary-600 dark:text-primary-400 bg-primary-50 dark:bg-primary-900/20 hover:bg-primary-100 dark:hover:bg-primary-900/40 transition-colors">
                            View
                        </button>
                        <button (click)="removeDoctor(doc.id)"
                            class="w-10 flex items-center justify-center rounded-xl bg-red-50 dark:bg-red-900/20 text-red-500 hover:bg-red-500 hover:text-white transition-colors">
                            <i-lucide name="trash-2" class="w-4 h-4"></i-lucide>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </ng-container>

</div>

<!-- ── ADD DOCTOR MODAL ── -->
<div *ngIf="showAddModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" (click)="showAddModal = false"></div>

    <!-- Modal -->
    <div
        class="relative bg-white dark:bg-slate-800 rounded-[2rem] shadow-2xl border border-slate-100 dark:border-slate-700 w-full max-w-lg p-8 animate-fade-in-up">

        <!-- Close button -->
        <button (click)="showAddModal = false"
            class="absolute top-4 right-4 w-9 h-9 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">
            <i-lucide name="x" class="w-4 h-4"></i-lucide>
        </button>

        <div class="mb-6">
            <div class="w-12 h-12 rounded-2xl bg-primary-50 flex items-center justify-center mb-4">
                <i-lucide name="user-plus" class="w-6 h-6 text-primary-500"></i-lucide>
            </div>
            <h3 class="text-xl font-black text-slate-900 dark:text-white font-heading">Add New Doctor</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">This doctor will appear on the public landing
                page.</p>
        </div>

        <form (ngSubmit)="addDoctor()" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Full Name *</label>
                <input type="text" [(ngModel)]="newDoctor.name" name="name" required placeholder="Dr. Jane Smith"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-primary-400 focus:border-transparent outline-none text-slate-800 dark:text-white placeholder-slate-400 transition-all text-sm">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Specialty *</label>
                <select [(ngModel)]="newDoctor.specialty" name="specialty" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-primary-400 focus:border-transparent outline-none text-slate-800 dark:text-white transition-all text-sm appearance-none">
                    <option value="">Select a specialty...</option>
                    @for (spec of specialties; track spec) {
                    <option [value]="spec">{{ spec }}</option>
                    }
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Profile Photo URL
                    <span class="text-slate-400 font-normal">(optional)</span></label>
                <input type="url" [(ngModel)]="newDoctor.image" name="image" placeholder="https://..."
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-primary-400 focus:border-transparent outline-none text-slate-800 dark:text-white placeholder-slate-400 transition-all text-sm">
                <p class="text-xs text-slate-400 mt-1.5">Leave blank to auto-generate from name initials.</p>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="button" (click)="showAddModal = false"
                    class="flex-1 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors text-sm">
                    Cancel
                </button>
                <button type="submit"
                    class="flex-1 py-3 rounded-2xl bg-primary-500 hover:bg-primary-600 text-white font-bold shadow-md shadow-primary-500/25 active:scale-95 transition-all text-sm flex items-center justify-center gap-2">
                    <i-lucide name="plus" class="w-4 h-4"></i-lucide>
                    Add Doctor
                </button>
            </div>
        </form>
    </div>
</div>
