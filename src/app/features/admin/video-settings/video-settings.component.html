<div class="max-w-4xl mx-auto p-4 sm:p-6 animate-fade-in">
    <div class="mb-8">
        <h2 class="text-2xl sm:text-3xl font-black text-slate-800 dark:text-white tracking-tight">Video Management</h2>
        <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm sm:text-base">Manage the YouTube video shown in the hero section of the landing page.</p>
    </div>

    <!-- Main Config Card -->
    <div class="bg-white dark:bg-slate-800 rounded-3xl sm:rounded-[2.5rem] border border-slate-100 dark:border-slate-700 shadow-glass overflow-hidden">
        <div class="p-6 sm:p-10">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                
                <!-- Form Section -->
                <div class="space-y-8">
                    <div>
                        <label class="block text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">YouTube URL</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i-lucide name="youtube" class="w-5 h-5 text-red-500"></i-lucide>
                            </div>
                            <input type="text" [(ngModel)]="videoUrl"
                                placeholder="https://www.youtube.com/watch?v=..."
                                class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900/50 border-2 border-slate-100 dark:border-slate-800 rounded-2xl text-sm focus:border-primary-500/50 outline-none transition-all dark:text-white">
                        </div>
                        <p class="text-[10px] text-slate-400 mt-2 italic">* Supports standard watch URLs, shorts, and embed links.</p>
                    </div>

                    <div class="flex items-center justify-between p-5 bg-slate-50 dark:bg-slate-900/50 rounded-2xl border border-slate-100 dark:border-slate-800">
                        <div>
                            <p class="text-sm font-bold text-slate-800 dark:text-white">Display on Landing Page</p>
                            <p class="text-xs text-slate-500 dark:text-slate-400">Enable or disable the video in the hero section.</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" [(ngModel)]="isActive" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:after:border-slate-600 peer-checked:bg-primary-500"></div>
                        </label>
                    </div>

                    <button (click)="onSave()" 
                        [disabled]="isLoading"
                        class="w-full py-4 bg-primary-500 hover:bg-primary-600 text-white font-black rounded-2xl shadow-xl shadow-primary-500/20 active:scale-95 transition-all flex items-center justify-center gap-3">
                        <i-lucide *ngIf="!isLoading" name="save" class="w-5 h-5"></i-lucide>
                        <span *ngIf="isLoading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                        {{ isLoading ? 'Saving Changes...' : 'Update Settings' }}
                    </button>
                </div>

                <!-- Preview Section -->
                <div class="flex flex-col">
                    <label class="block text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">Live Preview</label>
                    <div class="relative flex-1 aspect-video lg:aspect-auto rounded-3xl overflow-hidden bg-slate-100 dark:bg-slate-900 shadow-inner border border-slate-100 dark:border-slate-800">
                        <ng-container *ngIf="previewId; else emptyPreview">
                            <iframe class="w-full h-full min-h-[250px]"
                                [src]="'https://www.youtube.com/embed/' + previewId | safe:'resourceUrl'"
                                frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                allowfullscreen>
                            </iframe>
                        </ng-container>
                        <ng-template #emptyPreview>
                            <div class="w-full h-full min-h-[250px] flex flex-col items-center justify-center text-slate-300 p-10 text-center">
                                <i-lucide name="video-off" class="w-16 h-16 mb-4 opacity-50"></i-lucide>
                                <p class="text-sm font-bold uppercase tracking-wider">No Valid Video URL</p>
                                <p class="text-xs mt-1">Enter a valid YouTube URL to see preview</p>
                            </div>
                        </ng-template>

                        <!-- Active Badge overlay -->
                        <div *ngIf="isActive && previewId" class="absolute top-4 right-4 bg-emerald-500 text-white text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full shadow-lg animate-pulse">
                            ACTIVE ON SITE
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
